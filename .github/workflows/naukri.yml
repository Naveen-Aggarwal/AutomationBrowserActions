name: Naukri Profile Refresh

on:
  schedule:
    - cron: "30 2 * * 1-6"
    - cron: "30 3 * * 1-6"
    - cron: "30 4 * * 1-6"
    - cron: "30 5 * * 1-6"
    - cron: "30 6 * * 1-6"
    - cron: "30 7 * * 1-6"
    - cron: "30 8 * * 1-6"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Chrome via apt (stable, matches runner environment)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          # Get the exact installed version
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "Installed Chrome: $CHROME_VERSION"
          
          # Download matching ChromeDriver from Chrome for Testing
          MAJOR=$(echo $CHROME_VERSION | cut -d. -f1)
          CfT_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_$MAJOR")
          echo "ChromeDriver version: $CfT_VERSION"
          
          wget -q "https://storage.googleapis.com/chrome-for-testing-public/$CfT_VERSION/linux64/chromedriver-linux64.zip"
          unzip -q chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          
          # Sanity check
          google-chrome --version
          chromedriver --version

      - name: Install Python dependencies
        run: pip install selenium

      - name: Run refresh
        env:
          NAUKRI_EMAIL:    ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python naukri_single_refresh.py

      - name: Upload debug screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png