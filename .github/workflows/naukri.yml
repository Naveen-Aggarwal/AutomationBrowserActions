name: Naukri Profile Refresh

on:
  schedule:
    - cron: "30 2 * * 1-6"
    - cron: "30 3 * * 1-6"
    - cron: "30 4 * * 1-6"
    - cron: "30 5 * * 1-6"
    - cron: "30 6 * * 1-6"
    - cron: "30 7 * * 1-6"
    - cron: "30 8 * * 1-6"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install selenium undetected-chromedriver

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run refresh
        env:
          NAUKRI_EMAIL:    ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python naukri_single_refresh.py

      # Uploads screenshot ONLY if the step above fails
      - name: Upload debug screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png