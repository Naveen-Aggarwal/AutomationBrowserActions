name: Naukri Profile Refresh

on:
  schedule:
    - cron: "30 2 * * 1-6"
    - cron: "30 3 * * 1-6"
    - cron: "30 4 * * 1-6"
    - cron: "30 5 * * 1-6"
    - cron: "30 6 * * 1-6"
    - cron: "30 7 * * 1-6"
    - cron: "30 8 * * 1-6"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Chrome and matching ChromeDriver
        run: |
          # Install Chrome for Testing (version-pinned, avoids mismatch)
          wget -q https://storage.googleapis.com/chrome-for-testing-public/124.0.6367.91/linux64/chrome-linux64.zip
          wget -q https://storage.googleapis.com/chrome-for-testing-public/124.0.6367.91/linux64/chromedriver-linux64.zip
          
          unzip -q chrome-linux64.zip
          unzip -q chromedriver-linux64.zip
          
          sudo mv chrome-linux64/chrome /usr/local/bin/chrome
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chrome /usr/local/bin/chromedriver
          
          # Verify versions match
          chrome --version
          chromedriver --version

      - name: Install Python dependencies
        run: pip install selenium

      - name: Run refresh
        env:
          NAUKRI_EMAIL:    ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python naukri_single_refresh.py

      - name: Upload debug screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png